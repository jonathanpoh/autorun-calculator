<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Autorun Frame Calculator</title>

  <meta name="theme-color" content="#f2f4f7">
  <script src="twilight.js"></script>
  <script>
    (function () {
      try {
        const lat = localStorage.getItem('astroLat');
        const lon = localStorage.getItem('astroLon');
        const isNight = lat !== null && lon !== null && window.Twilight
          ? window.Twilight.isAstronomicalNight(new Date(), Number(lat), Number(lon))
          : localStorage.getItem('nightVision') === 'on';
        if (isNight) {
          document.documentElement.setAttribute('data-theme', 'night');
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#000000');
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Autorun">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
  <main class="calculator">
    <div class="calculator__header">
      <h1 class="calculator__title">Autorun Frame Calculator</h1>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-pressed="false">Night Vision</button>
    </div>
    <p class="calculator__subtitle">Plan how many sub-frames an imaging session will produce.</p>

    <form class="calculator__form">
      <div class="field-group">
        <label for="duration">Session duration</label>
        <div class="field-group__row">
          <input type="number" id="duration" min="0" step="0.1" value="4" inputmode="decimal">
          <select id="duration-unit">
            <option value="hours" selected>Hours</option>
            <option value="minutes">Minutes</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label for="overhead">Overhead %</label>
        <input type="number" id="overhead" min="0" max="99" step="1" value="15" inputmode="decimal">
      </div>

      <div class="field-group">
        <label for="exposure">Exposure time</label>
        <select id="exposure">
          <option value="60">60s</option>
          <option value="120">120s</option>
          <option value="180">180s</option>
          <option value="300" selected>300s</option>
          <option value="other">Other</option>
        </select>
        <input type="number" id="exposure-custom" min="1" step="1" placeholder="Seconds" aria-label="Custom exposure seconds" class="field-group__custom" hidden>
      </div>
    </form>

    <section class="result" aria-live="polite">
      <p class="result__headline"><span id="frame-count">0</span> frames</p>
      <dl class="result__breakdown">
        <div class="result__row">
          <dt>Usable imaging time</dt>
          <dd id="usable-time">0m</dd>
        </div>
        <div class="result__row">
          <dt>Time lost to overhead</dt>
          <dd id="overhead-time">0m</dd>
        </div>
        <div class="result__row">
          <dt>Actual total capture time</dt>
          <dd id="capture-time">0m</dd>
        </div>
      </dl>
    </section>
  </main>

  <script src="calculator-core.js"></script>
  <script src="app.js"></script>
  <script src="theme.js"></script>
  <script src="sw-register.js"></script>
</body>
</html>
